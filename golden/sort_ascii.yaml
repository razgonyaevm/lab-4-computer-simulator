source_code: |
  (setq num stdin)
  (setq addr 100)

  (while num
      (store addr num)
      (setq addr (+ addr 1))
      (setq num stdin))

  (setq end_addr addr)

  (setq i 100)
  (while (< i end_addr)
      (setq j (+ i 1))
      (while (< j end_addr)
          (setq val_i (load i))
          (setq val_j (load j))
          (if (< val_j val_i)
              (begin
                  (store i val_j)
                  (store j val_i)
                  (setq val_i val_j))
              0)
          (setq j (+ j 1)))
      (setq i (+ i 1)))

  (setq i 100)
  (while (< i end_addr)
      (print (load i))
      (print " ")
      (setq i (+ i 1)))

