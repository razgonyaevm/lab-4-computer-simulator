source_code: |
  (print "What is your name? ")

  (setq char stdin)
  (setq addr 100)

  (while (if (= char 10) 0 (if (= char 0) 0 1))
      (store addr char)
      (setq addr (+ addr 1))
      (setq char stdin))

  (store addr 0)

  (print "Hello, ")
  (print-str 100)
  (print "!")

