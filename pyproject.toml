[tool.ruff]
line-length = 120

[tool.ruff.lint]
# Включаем строгие правила проверки
select = ["E", "F", "W", "C90", "I", "N", "UP", "B", "A", "C4"]
# Игнорируем C901 (сложность функций), так как транслятор Lisp устроен
# как монолитная рекурсивная диспетчеризация S-выражений для избежания overengineering-а.
ignore = ["C901"]

[tool.mypy]
# Строгая проверка типов в mypy
disallow_untyped_defs = true
ignore_missing_imports = true
warn_unused_ignores = true